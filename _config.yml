title: "SequenceSpace"
tagline: "Computational biology — research, code, and commentary"
description: "A semi-technical blog covering new research in computational biology, coding tutorials, and commentary on comp bio in society."
author:
  name: "Arjun Deshpande"
  email: "you@example.com"
  instagram: "arjun645728"
  github: "arjundeshx"

baseurl: "/sequencespace"  # Set to "/repo-name" if hosting at username.github.io/repo-name
url: "https://arjundeshx.github.io"

# Build
markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: "highlight"

# Pagination
plugins:
  - jekyll-paginate
  - jekyll-feed
  - jekyll-seo-tag
paginate: 8
paginate_path: "/page/:num/"

# Collections / defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      comments: false

# Categories for your three content types
categories_label:
  research: "Research"
  tutorial: "Tutorial"
  commentary: "Commentary"

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - node_modules
  - vendor
