{% assign cat = include.category %}
{% if cat == 'research' %}
  <span class="tag tag-research">🔬 Research</span>
{% elsif cat == 'tutorial' %}
  <span class="tag tag-tutorial">⌨️ Tutorial</span>
{% elsif cat == 'commentary' %}
  <span class="tag tag-commentary">💬 Commentary</span>
{% else %}
  <span class="tag" style="background:rgba(107,122,141,0.12);color:#4a5568;">{{ cat }}</span>
{% endif %}
