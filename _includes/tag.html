{% assign cat = include.category %}
{% if cat == 'research' %}
  <span class="post-tag tag-research">Research</span>
{% elsif cat == 'tutorial' %}
  <span class="post-tag tag-tutorial">Tutorial</span>
{% elsif cat == 'commentary' %}
  <span class="post-tag tag-commentary">Commentary</span>
{% else %}
  <span class="post-tag" style="color:var(--text-dimmer);border-color:var(--text-dimmer);">{{ cat }}</span>
{% endif %}
