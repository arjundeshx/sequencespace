{% assign post = include.post %}
{% assign cat = post.category | default: post.categories[0] %}
<article class="post-card">
  <div class="post-meta" style="margin-bottom:0.75rem;">
    {% include tag.html category=cat %}
    <span class="dot">·</span>
    <time datetime="{{ post.date | date_to_xmlschema }}">{{ post.date | date: "%b %-d, %Y" }}</time>
  </div>
  <h2 class="post-title">
    <a href="{{ post.url | prepend: site.baseurl }}">{{ post.title }}</a>
  </h2>
  <p class="post-excerpt">
    {% if post.description %}{{ post.description }}{% else %}{{ post.excerpt | strip_html }}{% endif %}
  </p>
  <a href="{{ post.url | prepend: site.baseurl }}" class="read-more">Read</a>
</article>
